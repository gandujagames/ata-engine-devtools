name: CI

on:
  push:
  pull_request:

jobs:
  python-tools:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check Python syntax
        run: |
          python -m py_compile tools/validate_asset_names.py
          python -m py_compile tools/scan_engine_logs.py

      - name: Run asset validator smoke test
        run: |
          python tools/validate_asset_names.py .
